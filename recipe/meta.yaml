{% set name = "tf_object_detection" %}
{% set version = "2.19.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}
source:
  url: https://github.com/tensorflow/models/archive/v1.13.0.zip
  sha256: 8519a4c0c234f7e65dca8306fdbca3210eba5538dd491a56993978a7c7528d93

build:
  noarch: python
  number: 0

requirements:
  host:
    - python >=3.6
    - pip
    - protobuf
  run:
    - python >=3.6
    - tensorflow >=1.12.0
    - numpy >=1.16.1
    - protobuf >=3.0.0


test:
  imports:
    - object_detection
  requires:
    - cython

about:
  home: https://github.com/tensorflow/models/tree/master/research/object_detection
  license: Apache-2.0
  license_file: LICENSE
  summary: 'As an open source framework to to construct, train and deploy object detection models'
  description: |
    The TensorFlow Object Detection API is an open source
    framework built on top of TensorFlow that makes it easy
    to construct, train and deploy object detection models

extra:
  recipe-maintainers:
    - mxr-conda
    - dsangillo
